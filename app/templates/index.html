<!DOCTYPE html>
<html>
<head>
    <title>ShopWave AI Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🛍️ ShopWave Autonomous Agent</h1>

    <!-- Ticket Selection -->
    <div class="card">
        <h2>Select Ticket</h2>

        <select id="ticketSelect">
            {% for t in tickets %}
        <option value="{{ t.ticket_id }}">
            {{ t.ticket_id }} - {{ t.body[:60] }}
        </option>
            {% endfor %}
        </select>

        <button onclick="runAgent()">Run Agent</button>
        <button onclick="runAll()">Run All Tickets (Concurrent)</button>
    </div>

    <!-- Output -->
    <div class="card">
        <h2>Result</h2>
        <div id="result"></div>
    </div>

    <div class="card">
        <h2>Audit Trail</h2>
        <div id="logs"></div>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
